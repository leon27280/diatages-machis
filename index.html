<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#111827">
  <title>Συντάκτης ΔΓΕΠ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Συντάκτης ΔΓΕΠ</h1>
  <p>Προ του κειμένου • Κυρίως κείμενο • Μετά το κείμενο</p>
</header>
<nav>
  <button data-tab="tree" class="active">Δέντρο</button>
  <button data-tab="edit">Επεξεργασία</button>
  <button data-tab="preview">Προεπισκόπηση</button>
  <button data-tab="tools">Εργαλεία</button>
</nav>
<main>
<section id="tree" class="tab active">
  <div class="card">
    <h2>Ιεραρχία Διαταγής</h2>
    <div id="treeView"></div>
  </div>
</section>
<section id="edit" class="tab">
  <div class="card">
    <h2 id="editTitle">Επιλογή στοιχείου</h2>
    <label>Τίτλος</label>
    <input id="nodeTitle" />
    <label>Κείμενο</label>
    <textarea id="nodeText" rows="12"></textarea>
    <label>Πηγή από διαταγή προϊσταμένου / σημείωση</label>
    <textarea id="nodeSource" rows="4"></textarea>
    <div class="row">
      <button id="saveNode">Αποθήκευση</button>
      <button id="addChild">+ Υποστοιχείο</button>
      <button id="deleteNode" class="danger">Διαγραφή</button>
    </div>
  </div>
</section>
<section id="preview" class="tab">
  <div class="card">
    <h2>Προεπισκόπηση Διαταγής</h2>
    <pre id="previewText"></pre>
  </div>
</section>
<section id="tools" class="tab">
  <div class="card">
    <h2>Εισαγωγή Διαταγής Προϊσταμένου</h2>
    <p>Επικόλλησε κείμενο. Η εφαρμογή θα το κρατήσει ως πηγή και θα προσπαθήσει να συμπληρώσει αντίστοιχες ενότητες.</p>
    <textarea id="superiorText" rows="10"></textarea>
    <div class="row">
      <button id="analyzeSuperior">Ανάλυση & πρόχειρη συμπλήρωση</button>
      <button id="saveAll">Αποθήκευση στη συσκευή</button>
      <button id="resetAll" class="danger">Επαναφορά προτύπου</button>
    </div>
    <div class="row">
      <button id="downloadTxt">Λήψη TXT</button>
      <button id="downloadJson">Λήψη JSON</button>
      <input id="loadJson" type="file" accept="application/json">
    </div>
  </div>
</section>
</main>
<script src="app.js"></script>
</body>
</html>
