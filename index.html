<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111827" />
  <title>Συντάκτης ΔΓΕΠ v3</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Συντάκτης ΔΓΕΠ v3</h1>
    <div class="sub">Βήμα 1: Ιεραρχικό δέντρο παραγράφων / υποπαραγράφων / εδαφίων</div>
  </header>

  <main>
    <section class="card">
      <h2>Στοιχεία Διαταγής</h2>
      <div class="grid">
        <label>Μονάδα <input id="unit" placeholder="π.χ. Λόχος / Ίλη / Διμοιρία" /></label>
        <label>Προϊστάμενο κλιμάκιο <input id="higher" placeholder="π.χ. Τάγμα" /></label>
        <label>Τύπος <input id="doctype" value="ΔΙΑΤΑΓΗ ΕΠΙΧΕΙΡΗΣΕΩΝ" /></label>
        <label>Αριθμός <input id="docno" placeholder="Υπ’ αριθμ." /></label>
        <label>Ημερομηνία/ώρα <input id="dtg" placeholder="π.χ. 011200Α ΙΟΥΛ 26" /></label>
        <label>Ωρική ζώνη <input id="tz" placeholder="π.χ. BRAVO" /></label>
      </div>
    </section>

    <section class="card actions">
      <button id="saveBtn">Αποθήκευση</button>
      <button id="loadBtn">Φόρτωση</button>
      <button id="exportTxtBtn">Εξαγωγή TXT</button>
      <button id="exportJsonBtn">Εξαγωγή JSON</button>
      <label class="fileBtn">Εισαγωγή JSON<input id="importJson" type="file" accept="application/json,.json" /></label>
      <button id="clearBtn" class="danger">Καθαρισμός</button>
    </section>

    <section class="layout">
      <aside class="card">
        <h2>Δέντρο Διαταγής</h2>
        <div id="tree"></div>
      </aside>

      <section class="card editor">
        <h2 id="editTitle">Επιλογή τμήματος</h2>
        <label>Τίτλος
          <input id="nodeTitle" />
        </label>
        <label>Περιεχόμενο
          <textarea id="nodeText" rows="10" placeholder="Συμπλήρωσε εδώ το κείμενο του συγκεκριμένου εδαφίου..."></textarea>
        </label>
        <label>Πηγή από διαταγή προϊσταμένου
          <textarea id="nodeSource" rows="4" placeholder="Απόσπασμα/σημείωση από τη διαταγή του προϊσταμένου κλιμακίου"></textarea>
        </label>
        <div class="actions">
          <button id="addChildBtn">+ Προσθήκη εδαφίου/υποεδάφιου</button>
          <button id="deleteNodeBtn" class="danger">Διαγραφή κόμβου</button>
        </div>
      </section>
    </section>

    <section class="card">
      <h2>Έλεγχος Πληρότητας</h2>
      <div id="checks"></div>
    </section>

    <section class="card">
      <h2>Προεπισκόπηση</h2>
      <pre id="preview"></pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
